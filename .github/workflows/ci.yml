name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[all]'

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[all]'

      - name: Mypy
        run: mypy src/coderag/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.11","3.12","3.13"]') || fromJSON('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e '.[all]'
          pip install tree-sitter-rust

      - name: Verify parser grammars
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'tree_sitter',
              'tree_sitter_php',
              'tree_sitter_javascript',
              'tree_sitter_typescript',
              'tree_sitter_python',
              'tree_sitter_css',
              'tree_sitter_scss',
              'tree_sitter_go',
              'tree_sitter_rust',
          ]
          for name in modules:
              importlib.import_module(name)
              print(f'OK {name}')
          PY

      - name: Run tests
        run: pytest -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 30
